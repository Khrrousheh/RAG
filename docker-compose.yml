name: "RAG model based Gemma3"

services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports: ["${QDRANT_HOST_PORT:-6334}:6333"]
    volumes: [./qdrant_data:/qdrant/storage]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: company_policies_structural
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      API_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      HF_HUB_DISABLE_XET: "1"
      WARM_EMBEDDINGS_ON_STARTUP: "false"
      WARM_LLM_ON_STARTUP: "false"
      WARM_METADATA_ON_STARTUP: "true"
      EMBEDDING_CACHE_SIZE: "256"
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PREDICT: "384"
      PROMPT_CONTEXT_MAX_CHARS: "3600"
      PROMPT_MIN_SOURCES: "3"
      PROMPT_MAX_SOURCES: "5"
      HTTP_MAX_CONNECTIONS: "20"
      HTTP_MAX_KEEPALIVE_CONNECTIONS: "10"
    models:
      llm:
        endpoint_var: OLLAMA_BASE_URL
        model_var: OLLAMA_MODEL
    ports: ["8000:8000"]
    depends_on:
      - qdrant
    volumes:
      - hf_cache:/root/.cache/huggingface

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports: ["5173:5173"]
    depends_on:
      - backend

volumes:
  hf_cache:

models:
  llm:
    model: ai/gemma3-qat
    context_size: 4096
