services:
  postgres:
    ports: !override
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    ports: !override
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"

  qdrant:
    ports: !override
      - "${QDRANT_HOST_BIND:-127.0.0.1}:${QDRANT_HOST_PORT:-6334}:6333"

  backend:
    environment:
      API_CORS_ORIGINS: "http://localhost:${FRONTEND_HOST_PORT:-8080},http://127.0.0.1:${FRONTEND_HOST_PORT:-8080}"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-dev-change-me-access-secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-dev-change-me-refresh-secret}"
      REFRESH_COOKIE_SECURE: "${REFRESH_COOKIE_SECURE:-false}"
      REFRESH_COOKIE_SAMESITE: "${REFRESH_COOKIE_SAMESITE:-lax}"
      SEED_DEFAULT_USER: "${SEED_DEFAULT_USER:-false}"
      DEFAULT_USER_LOGIN: "${DEFAULT_USER_LOGIN:-admin@example.com}"
      DEFAULT_USER_PASSWORD: "${DEFAULT_USER_PASSWORD:-replace-before-enabling-seed}"
      DEFAULT_USER_DISPLAY_NAME: "${DEFAULT_USER_DISPLAY_NAME:-Admin}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-company_policies_structural}"
      QDRANT_MEMORY_COLLECTION: "${QDRANT_MEMORY_COLLECTION:-user_memories}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
      OLLAMA_NUM_PREDICT: "${OLLAMA_NUM_PREDICT:-384}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-30m}"
      WARM_METADATA_ON_STARTUP: "${WARM_METADATA_ON_STARTUP:-false}"
      PROMPT_CONTEXT_MAX_CHARS: "${PROMPT_CONTEXT_MAX_CHARS:-3600}"
      PROMPT_MIN_SOURCES: "${PROMPT_MIN_SOURCES:-3}"
      PROMPT_MAX_SOURCES: "${PROMPT_MAX_SOURCES:-5}"
      EMBEDDING_CACHE_SIZE: "${EMBEDDING_CACHE_SIZE:-256}"
    ports: !override
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:8000"

  memory-worker:
    environment:
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-dev-change-me-access-secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-dev-change-me-refresh-secret}"
      SEED_DEFAULT_USER: "${SEED_DEFAULT_USER:-false}"
      DEFAULT_USER_LOGIN: "${DEFAULT_USER_LOGIN:-admin@example.com}"
      DEFAULT_USER_PASSWORD: "${DEFAULT_USER_PASSWORD:-replace-before-enabling-seed}"
      DEFAULT_USER_DISPLAY_NAME: "${DEFAULT_USER_DISPLAY_NAME:-Admin}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-company_policies_structural}"
      QDRANT_MEMORY_COLLECTION: "${QDRANT_MEMORY_COLLECTION:-user_memories}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
      OLLAMA_NUM_PREDICT: "${OLLAMA_NUM_PREDICT:-384}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-30m}"
      WARM_METADATA_ON_STARTUP: "${WARM_METADATA_ON_STARTUP:-false}"
      PROMPT_CONTEXT_MAX_CHARS: "${PROMPT_CONTEXT_MAX_CHARS:-3600}"
      PROMPT_MIN_SOURCES: "${PROMPT_MIN_SOURCES:-3}"
      PROMPT_MAX_SOURCES: "${PROMPT_MAX_SOURCES:-5}"
      EMBEDDING_CACHE_SIZE: "${EMBEDDING_CACHE_SIZE:-256}"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: /api
    ports: !override
      - "${FRONTEND_HOST_BIND:-0.0.0.0}:${FRONTEND_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    depends_on:
      backend:
        condition: service_healthy
